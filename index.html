<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>阅读思维训练</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/leader-line-new@1.1.9/leader-line.min.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.21/mammoth.browser.min.js"></script>
    
    <script>
        if (typeof window !== 'undefined' && window['pdfjs-dist/build/pdf']) {
            window.pdfjsLib = window['pdfjs-dist/build/pdf'];
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
        }

        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        morandi: {
                            bg: '#f5f5f7',
                            surface: '#ffffff',
                            text: '#1d1d1f',
                            subtext: '#86868b',
                            border: '#e5e5ea',
                            primary: '#8e9eab',
                            primaryHover: '#788997',
                        }
                    },
                    fontFamily: {
                        sans: ['-apple-system', 'BlinkMacSystemFont', '"SF Pro Text"', '"Segoe UI"', 'Roboto', 'sans-serif'],
                        serif: ['"SF Pro Display"', '"Times New Roman"', 'Times', 'serif']
                    },
                    boxShadow: {
                        'apple': '0 4px 24px rgba(0, 0, 0, 0.04)',
                        'apple-modal': '0 20px 40px rgba(0, 0, 0, 0.12)',
                        'cbt': '0 2px 8px rgba(0, 0, 0, 0.04)',
                        'popover': '0 10px 30px rgba(0, 0, 0, 0.1)'
                    }
                }
            }
        }
    </script>

        <link rel="stylesheet" href="style.css">
</head>
<body class="h-screen flex flex-col font-sans selection:bg-gray-200">

    <header class="bg-white/80 backdrop-blur-md border-b border-morandi-border h-16 flex items-center justify-between px-8 z-30 shrink-0 relative">
        <div class="flex items-center gap-3">
            <h1 class="text-xl font-semibold tracking-tight text-morandi-text flex items-center gap-2">
                <svg class="w-6 h-6 text-morandi-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
                阅读思维训练 <span class="text-xs bg-indigo-100 text-indigo-700 px-2 py-0.5 rounded-full font-bold relative -top-1">机考版</span>
            </h1>
        </div>
        <div class="flex gap-3 items-center">
            <!-- 新增：排版调节呼出按钮 -->
            <div class="relative">
                <button onclick="toggleTypographyPopover()" class="btn-transition px-4 py-1.5 text-sm font-medium text-slate-600 bg-white hover:bg-slate-50 border border-slate-200 rounded-full flex items-center gap-1.5 shadow-sm">
                    <span class="font-serif italic font-bold">Aa</span> 排版
                </button>
                <!-- 排版调节面板 (Popover) -->
                <div id="typography-popover" class="hidden absolute top-full right-0 mt-2 w-64 bg-white border border-slate-200 rounded-xl shadow-popover p-5 z-50">
                    <h4 class="text-sm font-bold text-slate-800 mb-4 border-b border-slate-100 pb-2">👁️ 阅读排版调节</h4>
                    <div class="mb-5">
                        <div class="flex justify-between text-xs text-slate-500 font-semibold mb-2">
                            <span>字体大小 (Font Size)</span>
                            <span id="font-size-val">1.1rem</span>
                        </div>
                        <input type="range" id="font-size-slider" min="0.8" max="1.6" step="0.05" value="1.1" oninput="updateTypography()" class="w-full h-1.5 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-indigo-500">
                    </div>
                    <div>
                        <div class="flex justify-between text-xs text-slate-500 font-semibold mb-2">
                            <span>行高间距 (Line Height)</span>
                            <span id="line-height-val">2.8</span>
                        </div>
                        <input type="range" id="line-height-slider" min="1.8" max="4.0" step="0.1" value="2.8" oninput="updateTypography()" class="w-full h-1.5 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-indigo-500">
                    </div>
                </div>
            </div>

            <button id="timer-btn" onclick="handleTimerClick()" class="btn-transition px-4 py-1.5 text-sm font-medium text-morandi-subtext hover:text-morandi-text bg-transparent border border-morandi-border hover:bg-gray-50 rounded-full flex items-center gap-1.5">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                <span id="timer-display">番茄钟</span>
            </button>
            <div class="w-px h-5 bg-morandi-border mx-1"></div>
            
            <button onclick="openVocabListModal()" class="btn-transition px-4 py-1.5 text-sm font-medium text-indigo-600 bg-indigo-50 hover:bg-indigo-100 border border-indigo-100 rounded-full flex items-center gap-1.5">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
                生词本 <span id="vocab-count-badge" class="ml-1 bg-white text-indigo-600 text-[10px] font-bold px-1.5 py-0.5 rounded-full shadow-sm">0</span>
            </button>

            <button onclick="clearAllLines()" class="btn-transition px-4 py-1.5 text-sm font-medium text-morandi-subtext hover:text-morandi-text bg-transparent border border-morandi-border hover:bg-gray-50 rounded-full">
                清除连线
            </button>
            <button onclick="openGuideModal()" class="btn-transition px-4 py-1.5 text-sm font-medium text-morandi-text bg-gray-100 hover:bg-gray-200 rounded-full flex items-center gap-1.5">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                操作说明
            </button>
            <button onclick="openInputModal()" class="btn-transition px-5 py-1.5 text-sm font-medium bg-morandi-primary text-white rounded-full hover:bg-morandi-primaryHover shadow-sm flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                载入机考文本
            </button>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden relative p-4 gap-2" id="split-container">
        <!-- 原文区 (改用百分比宽度以便拖拽计算) -->
        <section id="left-panel" style="width: 50%;" class="flex flex-col bg-morandi-surface rounded-2xl shadow-apple overflow-hidden relative shrink-0">
            <div class="bg-transparent py-3 px-6 border-b border-morandi-border text-xs font-semibold uppercase tracking-wider text-morandi-subtext z-10 flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                Passage (原文)
            </div>
            <div id="passage-workspace" class="content-area p-8 overflow-y-auto flex-1 font-serif text-gray-800" onscroll="updateLinesThrottled()">
                <div class="h-full flex flex-col items-center justify-center text-morandi-subtext">
                    <p class="mb-4">点击右上角「载入机考文本」导入阅读内容</p>
                </div>
            </div>
        </section>

        <!-- 真正生效的拖拽条 -->
        <div class="resizer" id="drag-bar" title="左右拖动调整页面比例"></div>

        <!-- 题干区 -->
        <section id="right-panel" style="width: calc(50% - 16px);" class="flex flex-col bg-morandi-surface rounded-2xl shadow-apple overflow-hidden relative flex-1">
            <div class="bg-transparent py-3 px-6 border-b border-morandi-border text-xs font-semibold uppercase tracking-wider text-morandi-subtext z-10 flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                Questions (机考界面)
            </div>
            <div id="questions-workspace" class="content-area p-6 lg:p-10 overflow-y-auto flex-1 font-sans text-gray-800 bg-[#f8fafc]" onscroll="updateLinesThrottled()">
                <div class="h-full flex flex-col items-center justify-center text-morandi-subtext">
                    <p class="mb-4">运用快捷键进行标注和连线</p>
                </div>
            </div>
        </section>
    </main>
    
    <!-- [此处保留：文本载入 input-modal, 校对 step-2-review, guide-modal, vocab-modal, list-modal, chunk-label, line-label, timer] -->
    <div id="input-modal" class="fixed inset-0 hidden z-50 flex items-center justify-center opacity-0 transition-opacity duration-300">
        <div class="absolute inset-0 modal-overlay" onclick="closeInputModal()"></div>
        <div class="bg-white rounded-2xl shadow-apple-modal w-full max-w-5xl relative z-10 flex flex-col h-[85vh] transform scale-95 transition-transform duration-300">
            <div id="step-1-input" class="flex-1 flex flex-col overflow-hidden">
                <div class="flex border-b border-morandi-border bg-gray-50 rounded-t-2xl px-8 pt-5 justify-between items-center">
                    <div class="flex gap-6 -mb-px">
                        <button class="pb-3 px-2 font-semibold text-morandi-primary border-b-2 border-morandi-primary">Step 1: 粘贴原文与题干</button>
                    </div>
                    <div class="flex items-center gap-3 mb-3">
                        <button onclick="closeInputModal()" class="p-1 text-morandi-subtext hover:text-morandi-text bg-white rounded-full shadow-sm border border-gray-200"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
                    </div>
                </div>
                <div class="p-6 flex-1 flex gap-4 bg-white relative">
                    <div class="flex-1 flex flex-col">
                        <label class="text-xs font-semibold text-gray-500 mb-2 uppercase tracking-wide">Passage 原文区域</label>
                        <textarea id="input-passage" class="flex-1 p-4 border border-morandi-border rounded-xl focus:ring-2 focus:ring-morandi-primary outline-none resize-none text-sm font-sans text-gray-700 bg-gray-50" placeholder="在此处粘贴文章原文..."></textarea>
                    </div>
                    <div class="flex-1 flex flex-col relative">
                        <label class="text-xs font-semibold text-indigo-500 mb-2 uppercase tracking-wide flex items-center gap-1"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg> Questions 杂乱题干提取区</label>
                        <textarea id="input-questions" class="flex-1 p-4 border border-indigo-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none resize-none text-sm font-sans text-gray-700 bg-indigo-50/30" placeholder="在此粘贴网页复制的混乱题干，系统会自动清洗解析..."></textarea>
                    </div>
                </div>
                <div class="px-8 py-4 border-t border-morandi-border flex justify-end bg-gray-50 rounded-b-2xl shrink-0">
                    <button onclick="processToReview()" class="btn-transition px-8 py-2.5 bg-indigo-600 text-white rounded-xl font-medium shadow-sm hover:bg-indigo-700 flex items-center gap-2">
                        进入机考结构化校对 <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                    </button>
                </div>
            </div>

            <div id="step-2-review" class="hidden flex-1 flex flex-col overflow-hidden">
                <div class="flex border-b border-morandi-border bg-gray-50 rounded-t-2xl px-8 py-4 justify-between items-center shrink-0">
                    <div>
                        <h3 class="font-bold text-gray-800 flex items-center gap-2">
                            <span class="bg-indigo-100 text-indigo-700 px-2 py-0.5 rounded text-xs">Step 2</span> 
                            题干结构校对台
                        </h3>
                        <p class="text-xs text-gray-500 mt-1">系统已自动解析题型，请人工微调识别错位的文本。</p>
                    </div>
                    <button onclick="closeInputModal()" class="p-1 text-gray-400 hover:text-gray-700"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
                </div>
                <div class="p-6 flex-1 overflow-y-auto bg-slate-100 translation-scroll" id="review-container"></div>
                <div class="px-8 py-4 border-t border-morandi-border flex justify-between bg-white rounded-b-2xl shrink-0 items-center">
                    <button onclick="backToStep1()" class="text-sm font-medium text-gray-500 hover:text-gray-800">← 返回重贴文本</button>
                    <button onclick="confirmAndRenderCBT()" class="btn-transition px-8 py-2.5 bg-green-600 text-white rounded-xl font-medium shadow-sm hover:bg-green-700 flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg> 确认无误，生成机考界面
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 其余弹窗 -->
    <div id="guide-modal" class="fixed inset-0 hidden z-50 flex items-center justify-center opacity-0 transition-opacity duration-300"><div class="absolute inset-0 modal-overlay" onclick="closeGuideModal()"></div><div class="bg-white rounded-2xl shadow-apple-modal w-full max-w-2xl relative z-10 overflow-hidden transform scale-95 transition-transform duration-300 flex flex-col max-h-[90vh]"><div class="px-8 py-5 border-b border-morandi-border flex justify-between items-center bg-gray-50"><h3 class="text-lg font-semibold text-morandi-text">⌨️ 快捷键与操作指南</h3><button onclick="closeGuideModal()" class="text-morandi-subtext hover:text-morandi-text"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button></div><div class="p-8 overflow-y-auto space-y-8"><div><h4 class="text-sm font-semibold text-morandi-text mb-3 uppercase tracking-wider">1. 结构化高亮</h4><div class="grid grid-cols-2 gap-4"><div class="bg-gray-50 p-4 rounded-xl border border-gray-100 flex items-center gap-3"><kbd class="bg-white border border-gray-200 rounded px-2.5 py-1 text-sm font-bold text-gray-700 shadow-sm">A</kbd><div><div class="text-sm font-bold text-morandi-text">核心主干</div></div></div><div class="bg-gray-50 p-4 rounded-xl border border-gray-100 flex items-center gap-3"><kbd class="bg-white border border-gray-200 rounded px-2.5 py-1 text-sm font-bold text-gray-700 shadow-sm">S</kbd><div><div class="text-sm font-bold text-morandi-text">次要修饰</div></div></div></div></div></div><div class="px-8 py-5 border-t border-morandi-border bg-gray-50 flex justify-end"><button onclick="closeGuideModal()" class="btn-transition px-8 py-2.5 bg-morandi-primary text-white rounded-full font-medium hover:bg-morandi-primaryHover">开始练习</button></div></div></div>
    <div id="vocab-modal" class="fixed inset-0 hidden z-50 flex items-center justify-center opacity-0 transition-opacity duration-300"><div class="absolute inset-0 modal-overlay" onclick="closeVocabModal()"></div><div class="bg-white rounded-2xl shadow-apple-modal w-full max-w-sm relative z-10 overflow-hidden transform scale-95 transition-transform duration-300 flex flex-col"><div class="px-6 py-5 border-b border-morandi-border flex justify-between items-center"><h3 class="font-semibold text-morandi-text">查词</h3><button onclick="closeVocabModal()" class="text-morandi-subtext"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button></div><div class="p-6 space-y-4"><input type="text" id="vocab-target" class="w-full px-3 py-2 bg-gray-50 border border-morandi-border rounded-xl font-semibold outline-none" readonly><div class="bg-gray-50 border border-morandi-border rounded-xl p-3 min-h-[5rem] overflow-y-auto" id="vocab-translation-box"></div><textarea id="vocab-chunks" rows="2" class="w-full px-3 py-2 border border-morandi-border rounded-xl outline-none text-sm resize-none"></textarea><button onclick="saveAndCloseVocab()" class="btn-transition w-full py-2.5 bg-indigo-600 text-white rounded-xl font-medium">保存入库</button></div></div></div>
    <div id="vocab-list-modal" class="fixed inset-0 hidden z-[55] flex items-center justify-center opacity-0 transition-opacity duration-300"><div class="absolute inset-0 modal-overlay" onclick="closeVocabListModal()"></div><div class="bg-white rounded-2xl shadow-apple-modal w-full max-w-2xl relative z-10 flex flex-col h-[75vh] transform scale-95 transition-transform duration-300"><div class="px-8 py-5 border-b border-morandi-border flex justify-between items-center bg-gray-50 rounded-t-2xl shrink-0"><h3 class="text-lg font-semibold">我的生词本积累</h3><button onclick="closeVocabListModal()"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button></div><div class="p-8 flex-1 overflow-y-auto bg-white translation-scroll" id="vocab-list-container"></div></div></div>
    <div id="chunk-label-modal" class="fixed inset-0 hidden z-[60] flex items-center justify-center opacity-0 transition-opacity duration-300"><div class="absolute inset-0 modal-overlay" onclick="closeChunkLabelModal()"></div><div class="bg-white rounded-2xl shadow-apple-modal w-full max-w-sm relative z-10 overflow-hidden transform scale-95 transition-transform duration-300 flex flex-col p-6"><div class="flex justify-between items-center mb-5"><h3 class="text-lg font-semibold text-morandi-text">添加词块论证标签</h3><button onclick="closeChunkLabelModal()"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button></div><div class="grid grid-cols-2 gap-2.5 mb-2"><button onclick="applyChunkLabel('观点')" class="btn-transition text-left px-3 py-2 text-sm rounded-lg bg-gray-50 border border-gray-100">1 观点</button><button onclick="applyChunkLabel('背景')" class="btn-transition text-left px-3 py-2 text-sm rounded-lg bg-gray-50 border border-gray-100">2 背景</button><button onclick="applyChunkLabel('证据')" class="btn-transition text-left px-3 py-2 text-sm rounded-lg bg-gray-50 border border-gray-100">3 证据</button><button onclick="applyChunkLabel('举例')" class="btn-transition text-left px-3 py-2 text-sm rounded-lg bg-gray-50 border border-gray-100">4 举例</button><button onclick="applyChunkLabel('对比')" class="btn-transition text-left px-3 py-2 text-sm rounded-lg bg-gray-50 border border-gray-100">5 对比 (转折)</button><button onclick="applyChunkLabel('原因')" class="btn-transition text-left px-3 py-2 text-sm rounded-lg bg-gray-50 border border-gray-100">6 原因</button><button onclick="applyChunkLabel('结果')" class="btn-transition text-left px-3 py-2 text-sm rounded-lg bg-gray-50 border border-gray-100">7 结果</button><button onclick="applyChunkLabel('限定')" class="btn-transition text-left px-3 py-2 text-sm rounded-lg bg-gray-50 border border-gray-100">8 限定</button><button onclick="applyChunkLabel('结论')" class="btn-transition text-left px-3 py-2 text-sm rounded-lg bg-gray-50 border border-gray-100">9 结论</button><button onclick="applyChunkLabel('同义替换')" class="btn-transition text-left px-3 py-2 text-sm rounded-lg bg-blue-50 text-blue-700 border border-blue-100">P 同义替换</button></div><button onclick="applyChunkLabel('CLEAR')" class="mt-2 text-red-500 py-2 bg-red-50 rounded-xl">清除标签</button></div></div>
